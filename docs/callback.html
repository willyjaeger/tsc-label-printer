<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Redirigiendo...</title>
<style>
  body { font-family: system-ui, sans-serif; background: #111318; color: #e8e9ed;
         display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .box { text-align: center; }
  .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,.1);
             border-top-color: #f5a623; border-radius: 50%;
             animation: spin .7s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: #8a8d9a; font-size: .9rem; }
  .err { color: #e05555; margin-top: 20px; font-size: .85rem; display: none; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p>Conectando con MercadoLibre…</p>
  <div class="err" id="err">
    No se pudo redirigir a la app local.<br>
    Asegurate de que <strong>TSC Label Printer esté corriendo</strong> y volvé a intentar.
  </div>
</div>
<script>
  // Reenvía todos los parámetros (code, state, error) a la app local
  const dest = 'http://localhost:5050/auth/callback' + window.location.search;
  window.location.replace(dest);

  // Si después de 4s no redirigió, mostrar error
  setTimeout(() => { document.getElementById('err').style.display = 'block'; }, 4000);
</script>
</body>
</html>
